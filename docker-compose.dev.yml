# ---------------------------------------------------------------------------
# Development docker-compose for type-any-language.
#
# Same secret flow as docker-compose.yml (POSTGRES_PASSWORD_FILE /
# DATABASE_URL_FILE, identity from image labels), but:
#   • Source bind-mounts for hot-reload.
#   • No nginx — backend is exposed directly on :8000.
#   • Different image names (english_backend_dev, english_frontend_dev).
#   • Dev compose file points at ./backend/Dockerfile.dev etc.
#   • Audio: NOT a docker volume (same as prod). MP3s live in Tencent
#     Cloud COS, sentences.audio_url is a full COS URL baked into the
#     db image. Frontend reads it and the browser streams from COS.
#
# Run via:  ./scripts/dev-host/lifecycle.sh start
# BACKEND_IMAGE_TAG / FRONTEND_IMAGE_TAG default to the root ./VERSION
# file (resolved by scripts/lib.sh); the run script exports them before
# invoking compose. Override at start time:
#   BACKEND_IMAGE_TAG=v0.2.0 ./scripts/dev-host/lifecycle.sh start
# ---------------------------------------------------------------------------

secrets:
  postgres_password:
    file: ./.secrets/postgres_password
  database_url:
    file: ./.secrets/database_url

services:
  # -------------------------------------------------------------------------
  # Database — same content-baked image as prod (dev = prod unification
  # for content; only the runtime wrapper differs)
  # -------------------------------------------------------------------------
  db:
    image: ${DOCKER_REGISTRY:+${DOCKER_REGISTRY}/}${DB_IMAGE:-english_db_content}:${DB_IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:?DB_USER not set — run.sh did not export it from image labels}
      POSTGRES_DB:   ${DB_NAME:?DB_NAME not set — run.sh did not export it from image labels}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_password
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -------------------------------------------------------------------------
  # Backend — hot-reload via ./backend bind-mount + uvicorn --reload
  # -------------------------------------------------------------------------
  backend:
    image: english_backend_dev:${BACKEND_IMAGE_TAG:-latest}
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
      args:
        # Project VERSION (resolved by scripts/lib.sh) + best-effort git SHA.
        # Surfaces in the image as type-any-language.app.{version,git-sha}.
        APP_VERSION: ${BACKEND_IMAGE_TAG:-latest}
        GIT_SHA: ${GIT_SHA:-unknown}
    restart: unless-stopped
    environment:
      # CORS allowlist — dev defaults to localhost:3000 (CRA dev server).
      # Override via shell env if needed:
      #   ALLOWED_ORIGINS=... ./scripts/dev-host/lifecycle.sh start
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost,http://localhost:3000}
      DATABASE_URL_FILE: /run/secrets/database_url
    secrets:
      - database_url
    volumes:
      # Hot-reload source mount
      - ./backend:/app
    ports:
      # Expose backend directly on :8000 (no nginx in dev)
      - "8000:8000"
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    depends_on:
      db:
        condition: service_healthy

  # -------------------------------------------------------------------------
  # Frontend — Next.js dev server (HMR) on :3000
  #
  # Hot-reload layout (compose-watch based, no source bind mount):
  #   • Dockerfile.dev bakes the source tree + `npm ci` deps into the
  #     image as a baseline. .dockerignore keeps node_modules / .next /
  #     .git out of the image.
  #   • `develop.watch` (consumed by `docker compose watch`) syncs the
  #     hot paths into /app at runtime:
  #       - src/ + public/        → live HMR via next dev's watcher
  #       - package*.json         → entrypoint detects hash change on
  #                                 next start and runs `npm install`
  #                                 (no image rebuild required)
  #       - next.config.js / tsconfig.json / next-env.d.ts
  #                               → sync overlay; restart picks up
  #       - entrypoint.sh         → sync overlay; restart picks up
  #   • node_modules is in the container filesystem (NOT a named volume):
  #     container recreate wipes it, but entrypoint.sh reinstalls on
  #     cold start and skips on warm start (hash + .package-lock.json
  #     double-check). Trade-off vs the previous named-volume layout:
  #     lose the "warm start with deps preserved across `compose down`"
  #     property, gain "no bind mount needed, no race between bind and
  #     volume mount, no host frontend/.next pollution".
  #
  # Run via:  docker compose watch   (or ./scripts/dev-host/lifecycle.sh
  #           start, which auto-spawns `compose watch` in background).
  # -------------------------------------------------------------------------
  frontend:
    image: english_frontend_dev:${FRONTEND_IMAGE_TAG:-latest}
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
      args:
        # Project VERSION (resolved by scripts/lib.sh) + best-effort git SHA.
        # Surfaces in the image as type-any-language.app.{version,git-sha}.
        APP_VERSION: ${FRONTEND_IMAGE_TAG:-latest}
        GIT_SHA: ${GIT_SHA:-unknown}
    restart: unless-stopped
    environment:
      # In dev, the React app talks to the backend on the host directly
      # (no nginx in the path). NEXT_PUBLIC_API_URL is build-time.
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    # No `volumes:` block — source is baked into the image, hot paths
    # are synced by compose watch at runtime (see develop.watch below).
    develop:
      watch:
        # --- Source code (live HMR) ---
        - action: sync
          path: ./frontend/src
          target: /app/src
        - action: sync
          path: ./frontend/public
          target: /app/public

        # --- Package files (sync overlay; entrypoint picks up on restart) ---
        - action: sync
          path: ./frontend/package.json
          target: /app/package.json
        - action: sync
          path: ./frontend/package-lock.json
          target: /app/package-lock.json

        # --- Configs (sync overlay; restart picks up changes) ---
        - action: sync
          path: ./frontend/next.config.js
          target: /app/next.config.js
        - action: sync
          path: ./frontend/tsconfig.json
          target: /app/tsconfig.json
        - action: sync
          path: ./frontend/next-env.d.ts
          target: /app/next-env.d.ts

        # --- Dev-only scripts ---
        # entrypoint.sh sync: the running shell already has the old
        # version mapped (sh re-reads line by line but doesn't re-parse
        # the file mid-run). New containers / restarts pick up the
        # synced version. `sh ./entrypoint.sh` doesn't need +x, so the
        # mode bit isn't an issue.
        - action: sync
          path: ./frontend/entrypoint.sh
          target: /app/entrypoint.sh

    ports:
      - "3000:3000"
    # Dev mode: Next.js dev server with HMR. The Dockerfile's CMD also
    # sets `npm run dev`, but compose's `command:` overrides that — so we
    # mirror it here. (If we used `npm start`, it'd run `next start` which
    # needs a pre-built .next/ — the entrypoint only does `npm install`,
    # not `npm run build`, so production start would crash.)
    command: ["npm", "run", "dev"]
    depends_on:
      - backend

volumes:
  db-data:
