name: sync-secrets

# Dispatch-only workflow. Operators call
#   gh workflow run sync-secrets.yml -f which=cms|db|all -f request_id=$(uuidgen)
# from their workstation; the workflow picks the requested segment's
# secrets from ${{ secrets.* }}, writes a `secrets.env` artifact, and
# the operator downloads it via
#   gh run download <run-id> --name secrets-<which>-<request_id>
#
# Why dispatch + artifact (not gh api actions/secrets/NAME):
#   REST `actions/secrets` endpoints are write-only / metadata-only
#   — there is no way to read a secret's cleartext value back to the
#   caller. The only legal channel is ${{ secrets.* }} inside an
#   Actions runner, exported via actions/upload-artifact to the GH
#   artifact store. We then `gh run download` from the workstation.
#
# Retention is 1 day so a failed/abandoned download self-cleans.

on:
  workflow_dispatch:
    inputs:
      which:
        description: 'segment(s) to sync: cms | db | all'
        required: true
        default: 'cms'
        type: choice
        options: [cms, db, all]
      request_id:
        description: 'unique request id (becomes artifact name suffix)'
        required: true
        default: 'manual'
        type: string

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Pick secrets per segment
        id: pick
        env:
          AI_API_KEY:                 ${{ secrets.AI_API_KEY }}
          AI_BASE_URL:                ${{ secrets.AI_BASE_URL }}
          AI_MODEL:                   ${{ secrets.AI_MODEL }}
          TENCENT_SECRET_ID:          ${{ secrets.TENCENT_SECRET_ID }}
          TENCENT_SECRET_KEY:         ${{ secrets.TENCENT_SECRET_KEY }}
          TENCENT_APP_ID:             ${{ secrets.TENCENT_APP_ID }}
          CLOUD_PROVIDER:             ${{ secrets.CLOUD_PROVIDER }}
          CLOUD_BUCKET:               ${{ secrets.CLOUD_BUCKET }}
          CLOUD_REGION:               ${{ secrets.CLOUD_REGION }}
          CLOUD_ACCESS_KEY:           ${{ secrets.CLOUD_ACCESS_KEY }}
          CLOUD_SECRET_KEY:           ${{ secrets.CLOUD_SECRET_KEY }}
          CLOUD_ENDPOINT:             ${{ secrets.CLOUD_ENDPOINT }}
          TENCENT_DB_HOST:            ${{ secrets.TENCENT_DB_HOST }}
          TENCENT_DB_USER:            ${{ secrets.TENCENT_DB_USER }}
          TENCENT_DB_PASSWORD:        ${{ secrets.TENCENT_DB_PASSWORD }}
          TENCENT_DB_PROD_USER:       ${{ secrets.TENCENT_DB_PROD_USER }}
          TENCENT_DB_PROD_PASSWORD:   ${{ secrets.TENCENT_DB_PROD_PASSWORD }}
          TENCENT_DB_ADMIN_URL:       ${{ secrets.TENCENT_DB_ADMIN_URL }}
        run: |
          set +x
          : > secrets.env
          case "${{ inputs.which }}" in
            cms)
              for k in AI_API_KEY AI_BASE_URL AI_MODEL \
                       TENCENT_SECRET_ID TENCENT_SECRET_KEY TENCENT_APP_ID \
                       CLOUD_PROVIDER CLOUD_BUCKET CLOUD_REGION \
                       CLOUD_ACCESS_KEY CLOUD_SECRET_KEY CLOUD_ENDPOINT; do
                v="${!k:-}"
                [ -n "$v" ] || continue
                printf '%s=%s\n' "$k" "$v" >> secrets.env
              done
              ;;
            db)
              for k in TENCENT_DB_HOST TENCENT_DB_USER TENCENT_DB_PASSWORD \
                       TENCENT_DB_PROD_USER TENCENT_DB_PROD_PASSWORD \
                       TENCENT_DB_ADMIN_URL; do
                v="${!k:-}"
                [ -n "$v" ] || continue
                printf '%s=%s\n' "$k" "$v" >> secrets.env
              done
              ;;
            all)
              for k in AI_API_KEY AI_BASE_URL AI_MODEL \
                       TENCENT_SECRET_ID TENCENT_SECRET_KEY TENCENT_APP_ID \
                       CLOUD_PROVIDER CLOUD_BUCKET CLOUD_REGION \
                       CLOUD_ACCESS_KEY CLOUD_SECRET_KEY CLOUD_ENDPOINT \
                       TENCENT_DB_HOST TENCENT_DB_USER TENCENT_DB_PASSWORD \
                       TENCENT_DB_PROD_USER TENCENT_DB_PROD_PASSWORD \
                       TENCENT_DB_ADMIN_URL; do
                v="${!k:-}"
                [ -n "$v" ] || continue
                printf '%s=%s\n' "$k" "$v" >> secrets.env
              done
              ;;
          esac
          ARTIFACT_NAME="secrets-${{ inputs.which }}-${{ inputs.request_id }}"
          echo "ARTIFACT_NAME=$ARTIFACT_NAME" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: secrets.env
          retention-days: 1
          if-no-files-found: error
