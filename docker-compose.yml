# ---------------------------------------------------------------------------
# Production docker-compose for type-any-language.
#
# Key flow:
#   • DB image:  content-baked by ./db/scripts/build.sh with labels
#                (type-any-language.db.user, .db.name, .content.version, ...).
#                lifecycle.sh `docker inspect`s those labels at start time
#                and exports DB_USER / DB_NAME for compose env.
#   • Secrets:  POSTGRES_PASSWORD lives on the host (chmod 600 file) and is
#                passed to the db container via POSTGRES_PASSWORD_FILE.
#                DATABASE_URL is assembled host-side and passed to the
#                backend via DATABASE_URL_FILE. Nothing in the .env file
#                ends up as a container env var for these.
#   • DB_USER / DB_NAME: NOT in .env. Set by lifecycle.sh from image labels.
#   • DOCKER_REGISTRY / DB_IMAGE_TAG / BACKEND_IMAGE_TAG / FRONTEND_IMAGE_TAG:
#     NOT in .env. Set via the shell env (CI / wrapper / `export ...`).
#     Defaults are sourced from the root ./VERSION file by ops/lib.sh.
#     When DOCKER_REGISTRY is set, lifecycle.sh auto-pulls the latest
#     baked db image on every start/restart.
#   • Audio: NOT a docker volume. MP3s live in Tencent Cloud COS, and
#     sentences.audio_url (full COS URL) is baked into the db image.
#     The frontend reads sentence.audio_url and the browser streams
#     directly from COS. No /audio mount, no shared-audio volume.
#
# Run via:  ./ops/prod/lifecycle.sh start
# BACKEND_IMAGE_TAG / FRONTEND_IMAGE_TAG default to the root ./VERSION
# file (resolved by ops/lib.sh); the run script exports them before
# invoking compose. Override at start time:
#   BACKEND_IMAGE_TAG=v0.2.0 ./ops/prod/lifecycle.sh start
#
# The shared `db` service block lives in compose-shared.yml (compose v2.20+
# `include:`). Both prod and dev compose files include it; this file adds
# the prod-only services on top.
# ---------------------------------------------------------------------------

# Pull in shared fragments first. The shared file declares the `db`
# service + the `db-data` named volume — both compose files want those
# unchanged.
include:
  - path: ./compose-shared.yml

# Top-level `secrets:` block — secrets are FILES on the host, mounted
# into containers at /run/secrets/<name>. The host files are written by
# prod/lifecycle.sh's write_secrets() (chmod 600).
secrets:
  postgres_password:
    file: ./.secrets/postgres_password
  database_url:
    file: ./.secrets/database_url

services:
  # -------------------------------------------------------------------------
  # Backend — FastAPI / SQLAlchemy
  # -------------------------------------------------------------------------
  backend:
    image: english_backend:${BACKEND_IMAGE_TAG:-latest}
    build:
      context: ./backend
      args:
        # Project VERSION (resolved by ops/lib.sh) + best-effort git SHA.
        # Surfaces in the image as type-any-language.app.{version,git-sha}
        # labels (see backend/Dockerfile).
        APP_VERSION: ${BACKEND_IMAGE_TAG:-latest}
        GIT_SHA: ${GIT_SHA:-unknown}
    restart: unless-stopped
    environment:
      # CORS allowlist — override via shell env, e.g.
      #   ALLOWED_ORIGINS=https://my.domain ./ops/prod/lifecycle.sh start
      # Falls back to http://localhost so first-boot works out of the box
      # (replace this default with your real domain for production).
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost}
      # DB connection assembled host-side by run.sh and read from file
      DATABASE_URL_FILE: /run/secrets/database_url
    secrets:
      - database_url
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/vocabulary/libs"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # -------------------------------------------------------------------------
  # Frontend — React (CRA build), served by nginx
  # -------------------------------------------------------------------------
  frontend:
    image: english_frontend:${FRONTEND_IMAGE_TAG:-latest}
    build:
      context: ./frontend
      args:
        # Project VERSION (resolved by ops/lib.sh) + best-effort git SHA.
        # Surfaces in the image as type-any-language.app.{version,git-sha}
        # labels (see frontend/Dockerfile).
        APP_VERSION: ${FRONTEND_IMAGE_TAG:-latest}
        GIT_SHA: ${GIT_SHA:-unknown}
    restart: unless-stopped
    environment:
      # Build-time var baked into the JS bundle at image-build time.
      # If you change this, rebuild the frontend image.
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/}
    depends_on:
      backend:
        condition: service_healthy

  # -------------------------------------------------------------------------
  # nginx — reverse proxy
  # -------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      # nginx.conf lives next to the prod scripts (compose evaluates this
      # path relative to the compose file's directory, which is the repo
      # root — so `./ops/prod/nginx.conf` is the right form).
      - ./ops/prod/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend