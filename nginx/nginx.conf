events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    upstream backend {
        server backend:8000;
    }

    upstream frontend {
        server frontend:3000;
    }

    server {
        listen 80;
        server_name localhost;

        # API requests
        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Audio is NOT served from this nginx. The frontend reads
        # sentence.audio_url (a full Tencent Cloud COS URL baked into
        # the db image at build time) and the browser streams directly
        # from COS — no /audio path on this server.

        # Frontend static / Next.js
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
        }
    }
}
