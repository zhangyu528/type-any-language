# cms/seed/prompts/sentences.yaml — OpenAI prompt template for sentence generation.
#
# Extracted from cms/pipeline/generate_sentences.py:80-108 so prompt tweaks are
# a yaml edit, not a Python edit.
#
# Templating: `{{var}}` is replaced at runtime by cms/pipeline/prompt_renderer.py.
# Available variables:
#   lib_name   - manifest.libs[i].display   (e.g. "CET-4")
#   lib_id     - manifest.libs[i].id        (e.g. "cet4")
#   difficulty - manifest.libs[i].difficulties[j]  (e.g. "intermediate")
#   word_list  - comma-separated target words  (e.g. "boat, group, nineteen")
#   count      - number of sentences to generate  (int)

version: 1

# System prompt — set the model's role + output discipline.
system: |
  You are an English-teaching assistant. Generate practice sentences
  for English learners. Each sentence MUST use at least one of the
  target words. Match the requested difficulty level. Output JSON only.

  Do NOT include any reasoning, chain-of-thought, or "thinking" blocks
  in your response. Skip all preamble. Return only the JSON object.

# User prompt — concrete ask for THIS batch. Templated.
user: |
  Target words ({{count}}): {{word_list}}
  Difficulty: {{difficulty}}

  Generate {{count}} distinct sentences. Each sentence:
    - Uses 1-3 of the target words (case-insensitive, exact match).
    - Is natural, grammatical English.
    - Difficulty: {{difficulty}} (beginner=short+common; advanced=longer+idiomatic).
    - Length: 8-20 words.
    - Is unique across the batch.

  Return JSON: {"sentences": [
  {"text": "<en>", "chinese_text": "<zh translation>",
  "target_words": ["<matched words from target list>"],
  "topic": "<one of: daily_life, business, travel, tech, education, health, food, sports, entertainment, nature, other>",
  "register": "<one of: formal, neutral, informal, slang>",
  "cefr": "<one of: A1, A2, B1, B2, C1, C2>",
  "tags": ["<1-3 short lowercase tags>"]}, ...]}

# Documentation for humans + LLM. Not sent to the model.
output_json_shape: |
  {
    "sentences": [
      {
        "text": "<english sentence>",
        "chinese_text": "<chinese translation>",
        "target_words": ["<words from target list>"],
        "topic": "<topic enum>",
        "register": "<register enum>",
        "cefr": "<CEFR level>",
        "tags": ["<lowercase tag>", ...]
      }
    ]
  }