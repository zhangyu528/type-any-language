name: sync-secrets

# Dispatch-only workflow. Operators call
#   gh workflow run sync-secrets.yml \
#     -f tier=dev -f which=cms -f request_id=$(uuidgen)
# from their workstation; the workflow picks the requested tier+segment
# secrets from ${{ secrets.* }}, writes a `secrets.env` artifact, and
# the operator downloads it via
#   gh run download <run-id> --name secrets-<tier>-<which>-<request_id>
#
# Tiering:
#   - dev: reads *_DEV repo-level secrets (12 keys)
#   - prod: reads *_PROD repo-level secrets + TENCENT_DB_ADMIN_URL
#           from Environment 'production' (required reviewers)
# Why dispatch + artifact (not gh api actions/secrets/NAME):
#   REST `actions/secrets` endpoints are write-only / metadata-only
#   — there is no way to read a secret's cleartext value back to the
#   caller. The only legal channel is ${{ secrets.* }} inside an
#   Actions runner, exported via actions/upload-artifact to the GH
#   artifact store. We then `gh run download` from the workstation.
#
# Retention is 1 day so a failed/abandoned download self-cleans.

on:
  workflow_dispatch:
    inputs:
      tier:
        description: 'environment tier: dev | prod'
        required: true
        default: 'dev'
        type: choice
        options: [dev, prod]
      which:
        description: 'segment(s) to sync: cms | db | all'
        required: true
        default: 'cms'
        type: choice
        options: [cms, db, all]
      request_id:
        description: 'unique request id (becomes artifact name suffix)'
        required: true
        default: 'manual'
        type: string

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    environment: ${{ inputs.tier == 'prod' && 'production' || '' }}
    steps:
      - name: Pick secrets per tier+segment
        id: pick
        env:
          # cms segment — dev tier
          AI_API_KEY_DEV:             ${{ secrets.AI_API_KEY_DEV }}
          AI_BASE_URL_DEV:            ${{ secrets.AI_BASE_URL_DEV }}
          AI_MODEL_DEV:               ${{ secrets.AI_MODEL_DEV }}
          TENCENT_SECRET_ID_DEV:      ${{ secrets.TENCENT_SECRET_ID_DEV }}
          TENCENT_SECRET_KEY_DEV:     ${{ secrets.TENCENT_SECRET_KEY_DEV }}
          TENCENT_APP_ID_DEV:         ${{ secrets.TENCENT_APP_ID_DEV }}
          CLOUD_PROVIDER_DEV:         ${{ secrets.CLOUD_PROVIDER_DEV }}
          CLOUD_BUCKET_DEV:           ${{ secrets.CLOUD_BUCKET_DEV }}
          CLOUD_REGION_DEV:           ${{ secrets.CLOUD_REGION_DEV }}
          CLOUD_ACCESS_KEY_DEV:       ${{ secrets.CLOUD_ACCESS_KEY_DEV }}
          CLOUD_SECRET_KEY_DEV:       ${{ secrets.CLOUD_SECRET_KEY_DEV }}
          CLOUD_ENDPOINT_DEV:         ${{ secrets.CLOUD_ENDPOINT_DEV }}
          # cms segment — prod tier
          AI_API_KEY_PROD:            ${{ secrets.AI_API_KEY_PROD }}
          AI_BASE_URL_PROD:           ${{ secrets.AI_BASE_URL_PROD }}
          AI_MODEL_PROD:              ${{ secrets.AI_MODEL_PROD }}
          TENCENT_SECRET_ID_PROD:     ${{ secrets.TENCENT_SECRET_ID_PROD }}
          TENCENT_SECRET_KEY_PROD:    ${{ secrets.TENCENT_SECRET_KEY_PROD }}
          TENCENT_APP_ID_PROD:        ${{ secrets.TENCENT_APP_ID_PROD }}
          CLOUD_PROVIDER_PROD:        ${{ secrets.CLOUD_PROVIDER_PROD }}
          CLOUD_BUCKET_PROD:          ${{ secrets.CLOUD_BUCKET_PROD }}
          CLOUD_REGION_PROD:          ${{ secrets.CLOUD_REGION_PROD }}
          CLOUD_ACCESS_KEY_PROD:      ${{ secrets.CLOUD_ACCESS_KEY_PROD }}
          CLOUD_SECRET_KEY_PROD:      ${{ secrets.CLOUD_SECRET_KEY_PROD }}
          CLOUD_ENDPOINT_PROD:        ${{ secrets.CLOUD_ENDPOINT_PROD }}
          # db segment — dev tier
          TENCENT_DB_HOST_DEV:        ${{ secrets.TENCENT_DB_HOST_DEV }}
          TENCENT_DB_USER_DEV:        ${{ secrets.TENCENT_DB_USER_DEV }}
          TENCENT_DB_PASSWORD_DEV:    ${{ secrets.TENCENT_DB_PASSWORD_DEV }}
          # db segment — prod tier
          TENCENT_DB_HOST_PROD:       ${{ secrets.TENCENT_DB_HOST_PROD }}
          TENCENT_DB_USER_PROD:       ${{ secrets.TENCENT_DB_USER_PROD }}
          TENCENT_DB_PASSWORD_PROD:   ${{ secrets.TENCENT_DB_PASSWORD_PROD }}
          # admin URL — only resolvable from the 'production' Environment
          # secret; dev tier reads it as '' (the `environment:` line above
          # scopes the whole job to that env, so ${{ secrets.X }} there
          # only sees env-scoped secrets, not repo-level).
          TENCENT_DB_ADMIN_URL:       ${{ secrets.TENCENT_DB_ADMIN_URL }}
        run: |
          set +x
          : > secrets.env
          tier="${{ inputs.tier }}"
          which="${{ inputs.which }}"
          SFX="_${tier^^}"
          # bash indirect-expansion: ${!var} only accepts a single
          # identifier on the LHS, so we have to build the key in a
          # temp var first, then expand that.
          resolve() { local k="$1$2"; v="${!k:-}"; printf '%s' "$v"; }
          case "${which}" in
            cms)
              for k in AI_API_KEY AI_BASE_URL AI_MODEL \
                       TENCENT_SECRET_ID TENCENT_SECRET_KEY TENCENT_APP_ID \
                       CLOUD_PROVIDER CLOUD_BUCKET CLOUD_REGION \
                       CLOUD_ACCESS_KEY CLOUD_SECRET_KEY CLOUD_ENDPOINT; do
                v="$(resolve "$k" "$SFX")"
                [ -n "$v" ] || continue
                # Emit under the un-suffixed name (callers don't care
                # about the tier — they care about the role).
                printf '%s=%s\n' "$k" "$v" >> secrets.env
              done
              ;;
            db)
              for k in TENCENT_DB_HOST TENCENT_DB_USER TENCENT_DB_PASSWORD; do
                v="$(resolve "$k" "$SFX")"
                [ -n "$v" ] || continue
                printf '%s=%s\n' "$k" "$v" >> secrets.env
              done
              # admin URL is tier-blind (always prod path); emit it
              # only if non-empty (dev tier leaves it empty).
              if [ -n "${TENCENT_DB_ADMIN_URL:-}" ]; then
                printf 'TENCENT_DB_ADMIN_URL=%s\n' "$TENCENT_DB_ADMIN_URL" >> secrets.env
              fi
              ;;
            all)
              for k in AI_API_KEY AI_BASE_URL AI_MODEL \
                       TENCENT_SECRET_ID TENCENT_SECRET_KEY TENCENT_APP_ID \
                       CLOUD_PROVIDER CLOUD_BUCKET CLOUD_REGION \
                       CLOUD_ACCESS_KEY CLOUD_SECRET_KEY CLOUD_ENDPOINT \
                       TENCENT_DB_HOST TENCENT_DB_USER TENCENT_DB_PASSWORD; do
                v="$(resolve "$k" "$SFX")"
                [ -n "$v" ] || continue
                printf '%s=%s\n' "$k" "$v" >> secrets.env
              done
              if [ -n "${TENCENT_DB_ADMIN_URL:-}" ]; then
                printf 'TENCENT_DB_ADMIN_URL=%s\n' "$TENCENT_DB_ADMIN_URL" >> secrets.env
              fi
              ;;
          esac
          ARTIFACT_NAME="secrets-${tier}-${which}-${request_id}"
          echo "ARTIFACT_NAME=$ARTIFACT_NAME" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: secrets.env
          retention-days: 1
          if-no-files-found: error
