name: sync-secrets
run-name: sync-secrets-${{ inputs.tier }}-${{ inputs.which }}-${{ inputs.request_id }}

# Dispatch-only workflow. Operators call
#   gh workflow run sync-secrets.yml \
#     -f tier=dev -f which=cms -f request_id=$(uuidgen)
# from their workstation; the workflow picks the requested tier's
# Environment-scoped secrets, writes a `secrets.env` artifact, and the
# operator downloads it via
#   gh run download <run-id> --name secrets-<tier>-<which>-<request_id>
#
# Tiering (all secrets live in GH Environments, not repo-level):
#   - dev:   reads from Environment 'dev'   (no required reviewers — dev pace)
#   - test:  reads from Environment 'test'  (no required reviewers — CI pace)
#   - prod:  reads from Environment 'prod'  (required reviewers — blast radius)
#
# Naming: secret names are UNSUFFIXED (AI_API_KEY, not AI_API_KEY_DEV).
# The Environment itself is the namespace. The job's `environment:`
# field scopes ${{ secrets.* }} to that env, so the same key name in
# three environments stays separate.
#
# TENCENT_DB_ADMIN_URL is the same in all tiers (single shared admin
# DSN), so it lives in env 'prod' only. Dev/test use per-host role
# credentials (TENCENT_DB_PASSWORD); admin URL is only needed for
# CREATE ROLE / DATABASE / GRANT (one-shot per host), which dev hosts
# already have via env 'dev' or — for fresh-bootstrap only — by
# temporarily promoting themselves via env 'prod' (gated by reviewers).
#
# Why dispatch + artifact (not gh api actions/secrets/NAME):
#   REST `actions/secrets` endpoints are write-only / metadata-only
#   — there is no way to read a secret's cleartext value back to the
#   caller. The only legal channel is ${{ secrets.* }} inside an
#   Actions runner, exported via actions/upload-artifact to the GH
#   artifact store. We then `gh run download` from the workstation.
#
# Retention is 1 day so a failed/abandoned download self-cleans.

on:
  workflow_dispatch:
    inputs:
      tier:
        description: 'environment tier: dev | test | prod'
        required: true
        default: 'dev'
        type: choice
        options: [dev, test, prod]
      which:
        description: 'segment(s) to sync: cms | db | all'
        required: true
        default: 'cms'
        type: choice
        options: [cms, db, all]
      request_id:
        description: 'unique request id (becomes artifact name suffix)'
        required: true
        default: 'manual'
        type: string

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    # Bind the job to the tier's GH Environment. This scopes
    # ${{ secrets.* }} to that env's secret store (not repo-level).
    # Prod has required reviewers configured in the UI — dispatching
    # a prod run will pause for approval before secrets are read.
    environment: ${{ inputs.tier }}
    steps:
      - name: Pick secrets per tier+segment
        id: pick
        env:
          # cms segment
          AI_API_KEY:                 ${{ secrets.AI_API_KEY }}
          AI_BASE_URL:                ${{ secrets.AI_BASE_URL }}
          AI_MODEL:                   ${{ secrets.AI_MODEL }}
          TENCENT_SECRET_ID:          ${{ secrets.TENCENT_SECRET_ID }}
          TENCENT_SECRET_KEY:         ${{ secrets.TENCENT_SECRET_KEY }}
          TENCENT_APP_ID:             ${{ secrets.TENCENT_APP_ID }}
          CLOUD_PROVIDER:             ${{ secrets.CLOUD_PROVIDER }}
          CLOUD_BUCKET:               ${{ secrets.CLOUD_BUCKET }}
          CLOUD_REGION:               ${{ secrets.CLOUD_REGION }}
          CLOUD_ACCESS_KEY:           ${{ secrets.CLOUD_ACCESS_KEY }}
          CLOUD_SECRET_KEY:           ${{ secrets.CLOUD_SECRET_KEY }}
          CLOUD_ENDPOINT:             ${{ secrets.CLOUD_ENDPOINT }}
          # db segment
          TENCENT_DB_HOST:            ${{ secrets.TENCENT_DB_HOST }}
          TENCENT_DB_USER:            ${{ secrets.TENCENT_DB_USER }}
          TENCENT_DB_PASSWORD:        ${{ secrets.TENCENT_DB_PASSWORD }}
          # admin URL only lives in env 'prod' (shared single DSN for
          # one-time CREATE ROLE / DATABASE / GRANT). Empty in dev/test
          # — the emit guards on `[ -n "$v" ]` and silently skips.
          TENCENT_DB_ADMIN_URL:       ${{ secrets.TENCENT_DB_ADMIN_URL }}
          # Step-internal env so $tier / $which / $request_id are
          # available in the `run:` block. `inputs.X` only expands
          # via ${{ ... }} interpolation — bare `$request_id` in
          # shell would be empty.
          _TIER:       ${{ inputs.tier }}
          _WHICH:      ${{ inputs.which }}
          _REQUEST_ID: ${{ inputs.request_id }}
        run: |
          set +x
          : > secrets.env
          tier="${_TIER}"
          which="${_WHICH}"
          request_id="${_REQUEST_ID}"
          case "${which}" in
            cms)
              for k in AI_API_KEY AI_BASE_URL AI_MODEL \
                       TENCENT_SECRET_ID TENCENT_SECRET_KEY TENCENT_APP_ID \
                       CLOUD_PROVIDER CLOUD_BUCKET CLOUD_REGION \
                       CLOUD_ACCESS_KEY CLOUD_SECRET_KEY CLOUD_ENDPOINT; do
                v="${!k:-}"
                [ -n "$v" ] || continue
                printf '%s=%q\n' "$k" "$v" >> secrets.env
              done
              ;;
            db)
              for k in TENCENT_DB_HOST TENCENT_DB_USER TENCENT_DB_PASSWORD; do
                v="${!k:-}"
                [ -n "$v" ] || continue
                printf '%s=%q\n' "$k" "$v" >> secrets.env
              done
              if [ -n "${TENCENT_DB_ADMIN_URL:-}" ]; then
                printf 'TENCENT_DB_ADMIN_URL=%q\n' "$TENCENT_DB_ADMIN_URL" >> secrets.env
              fi
              ;;
            all)
              for k in AI_API_KEY AI_BASE_URL AI_MODEL \
                       TENCENT_SECRET_ID TENCENT_SECRET_KEY TENCENT_APP_ID \
                       CLOUD_PROVIDER CLOUD_BUCKET CLOUD_REGION \
                       CLOUD_ACCESS_KEY CLOUD_SECRET_KEY CLOUD_ENDPOINT \
                       TENCENT_DB_HOST TENCENT_DB_USER TENCENT_DB_PASSWORD; do
                v="${!k:-}"
                [ -n "$v" ] || continue
                printf '%s=%q\n' "$k" "$v" >> secrets.env
              done
              if [ -n "${TENCENT_DB_ADMIN_URL:-}" ]; then
                printf 'TENCENT_DB_ADMIN_URL=%q\n' "$TENCENT_DB_ADMIN_URL" >> secrets.env
              fi
              ;;
          esac
          ARTIFACT_NAME="secrets-${tier}-${which}-${request_id}"
          echo "ARTIFACT_NAME=$ARTIFACT_NAME" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: secrets.env
          retention-days: 1
          if-no-files-found: error
