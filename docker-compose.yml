# ---------------------------------------------------------------------------
# Production docker-compose for type-any-language.
#
# Runtime model: postgres runs in a container on the CVM. Three services:
#
#   db         — postgres:15-alpine, bind-mounted to a host directory
#                for data persistence. Same instance lifetime as backend
#                (compose project). One db per prod host — prod doesn't
#                have per-branch or per-user db concepts (those are dev-
#                only).
#
#   backend    — FastAPI / uvicorn. Connects to db via DATABASE_URL env
#                (no secret-file indirection — simpler than the old
#                TencentDB-mode setup which relied on .secrets/database_url).
#
#   nginx      — reverse proxy, exposes :80 to the world. Backend is on
#                the internal network and NOT directly reachable.
#
# Migration flow:
#   - db service comes up with empty schema (or whatever state
#     /var/lib/postgresql/data holds — bind-mounted volume persists).
#   - backend container's entrypoint.sh runs `python -m migrations.runner`
#     on start → applies all pending migrations idempotently.
#   - first-time content: run `./db/scripts/import_staging.sh all`
#     on the CVM host (the host has python + the importer available).
#
# Run via:  ALLOWED_ORIGINS=https://my.domain ./ops/prod/lifecycle.sh start
# BACKEND_IMAGE_TAG / FRONTEND_IMAGE_TAG are semver tags from the
# version files (see ops/lib.sh::resolve_image_tag). Pull from registry
# if DOCKER_REGISTRY is set; otherwise the build script must produce
# the images locally first (ops/prod/build_image.sh).
# ---------------------------------------------------------------------------

secrets:
  # Used by the db service only (read by the postgres entrypoint).
  # Generated by the operator on first setup via `openssl rand -hex 32`
  # and dropped into ./.secrets/db_password (chmod 600). The default
  # English_password below is intentionally insecure — replace via
  # docker compose run --rm -it db bash before going live, or use a
  # secrets manager (TENCENT_CLOUD secret manager, etc.).
  # The `secrets:` block here is read by docker, not by the backend.
  db_password:
    file: ./.secrets/db_password

services:
  # -------------------------------------------------------------------------
  # db — local postgres for prod
  # -------------------------------------------------------------------------
  db:
    image: postgres:15-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-type-any-language}-db
    environment:
      POSTGRES_USER: english_prod
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password  # see secrets: above
      POSTGRES_DB: english_prod
    volumes:
      # Persistent data — bind-mounted to /var/lib/postgresql/data on the
      # CVM. Operator: create this dir + chown to UID 999 (postgres
      # alpine user) before first `docker compose up`.
      - /var/lib/type-any-language/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U english_prod -d english_prod"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # -------------------------------------------------------------------------
  # Backend — FastAPI / uvicorn, runs migrations on entrypoint
  # -------------------------------------------------------------------------
  backend:
    image: english_backend:${BACKEND_IMAGE_TAG:-latest}
    build:
      context: ./backend
      args:
        APP_VERSION: ${BACKEND_IMAGE_TAG:-latest}
        GIT_SHA: ${GIT_SHA:-unknown}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost}
      # Internal compose network — backend dials the db service by name.
      DATABASE_URL: postgresql://english_prod:$(cat /run/secrets/db_password)@db:5432/english_prod
    # entrypoint.sh runs migrations before exec-ing uvicorn.

  # -------------------------------------------------------------------------
  # nginx — reverse proxy on :80
  # -------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./ops/prod/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
