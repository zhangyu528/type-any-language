# ---------------------------------------------------------------------------
# Production docker-compose for type-any-language.
#
# Runtime model: target hosts connect directly to a Tencent Cloud
# (TencentDB) Postgres instance. There is no `db` service in this
# compose file — the database is an external dependency the backend
# dials over the public network (or a VPC peering / SSH tunnel).
#
# Key flow:
#   • Backend reads its DSN from a host-side file: `.secrets/database_url`,
#     written by `db/scripts/bootstrap_tencent.sh` (or `ops/prod/setup.sh
#     bootstrap`, which invokes it with OPS_TIER=prod). Compose mounts
#     that file into the backend container at /run/secrets/database_url
#     via the `secrets:` block below; `backend/app/config.py` reads it
#     through `DATABASE_URL_FILE` indirection.
#   • `ALLOWED_ORIGINS` is the only CORS knob and is NOT a .env key —
#     override via shell env at lifecycle start time:
#       ALLOWED_ORIGINS=https://my.domain ./ops/prod/lifecycle.sh start
#   • Image tags (`BACKEND_IMAGE_TAG` / `FRONTEND_IMAGE_TAG`) come from
#     the per-segment VERSION files (backend/VERSION, frontend/VERSION),
#     resolved by ops/lib.sh. Override at start time:
#       BACKEND_IMAGE_TAG=v0.2.0 ./ops/prod/lifecycle.sh start
#   • Audio: NOT a docker volume. MP3s live in Tencent Cloud COS, and
#     sentences.audio_url (full COS URL) is written into the cloud db
#     at `db/scripts/import_staging.sh` time. The frontend reads
#     sentence.audio_url and the browser streams directly from COS.
#     No /audio mount, no shared-audio volume.
#
# Run via:  ./ops/prod/lifecycle.sh start
# ---------------------------------------------------------------------------

secrets:
  database_url:
    file: ./.secrets/database_url

services:
  # -------------------------------------------------------------------------
  # Backend — FastAPI / SQLAlchemy
  # -------------------------------------------------------------------------
  backend:
    image: english_backend:${BACKEND_IMAGE_TAG:-latest}
    build:
      context: ./backend
      args:
        # Project VERSION (resolved by ops/lib.sh) + best-effort git SHA.
        # Surfaces in the image as type-any-language.app.{version,git-sha}
        # labels (see backend/Dockerfile).
        APP_VERSION: ${BACKEND_IMAGE_TAG:-latest}
        GIT_SHA: ${GIT_SHA:-unknown}
    restart: unless-stopped
    environment:
      # CORS allowlist — override via shell env, e.g.
      #   ALLOWED_ORIGINS=https://my.domain ./ops/prod/lifecycle.sh start
      # Falls back to http://localhost so first-boot works out of the box
      # (replace this default with your real domain for production).
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost}
      # Cloud-db DSN assembled host-side by ops/prod/setup.sh bootstrap
      # (writes .secrets/database_url from .secrets/tencent_db_*).
      DATABASE_URL_FILE: /run/secrets/database_url
    secrets:
      - database_url
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/vocabulary/libs"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # -------------------------------------------------------------------------
  # Frontend — Next.js production build, served by next start
  # -------------------------------------------------------------------------
  frontend:
    image: english_frontend:${FRONTEND_IMAGE_TAG:-latest}
    build:
      context: ./frontend
      args:
        # Project VERSION (resolved by ops/lib.sh) + best-effort git SHA.
        # Surfaces in the image as type-any-language.app.{version,git-sha}
        # labels (see frontend/Dockerfile).
        APP_VERSION: ${FRONTEND_IMAGE_TAG:-latest}
        GIT_SHA: ${GIT_SHA:-unknown}
    restart: unless-stopped
    environment:
      # Build-time var baked into the JS bundle at image-build time.
      # If you change this, rebuild the frontend image.
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/}
    depends_on:
      backend:
        condition: service_healthy

  # -------------------------------------------------------------------------
  # nginx — reverse proxy
  # -------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      # nginx.conf lives next to the prod scripts (compose evaluates this
      # path relative to the compose file's directory, which is the repo
      # root — so `./ops/prod/nginx.conf` is the right form).
      - ./ops/prod/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
